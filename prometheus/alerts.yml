groups:
  - name: ml-serving-alerts
    rules:
      - alert: HighP99Latency
        expr: histogram_quantile(0.99, rate(prediction_latency_seconds_bucket[5m])) > 0.2
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "p99 latency exceeded 200ms SLO"

      - alert: HighErrorRate
        expr: rate(prediction_errors_total[5m]) / rate(prediction_requests_total[5m]) > 0.01
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Error rate exceeded 1% SLO"

      - alert: DataDriftDetected
        expr: max(data_drift_psi) > 0.2
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "PSI drift threshold breached on at least one feature"

      - alert: PredictionDriftDetected
        expr: prediction_drift_kl_divergence > 0.1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "KL divergence on prediction distribution exceeded threshold"

      - alert: CanaryRollbackFired
        expr: increase(canary_rollback_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Canary auto-rollback triggered in the last 5 minutes"
